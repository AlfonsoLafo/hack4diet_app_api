$kind: http-request
name: 'create foto progreso'
method: POST
url: '{{baseUrl}}/api/fotos-progreso'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "idUsuario": "{{userId}}",
      "url": "https://example.com/photo.jpg",
      "fecha": "2026-01-01"
    }
